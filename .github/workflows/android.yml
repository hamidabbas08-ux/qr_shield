name: Build QR Shield AAB
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Build Release AAB (Play Store Target with Secrets)
        run: flutter build appbundle --release
        env:
          PLAY_STORE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          PLAY_STORE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_STORE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
