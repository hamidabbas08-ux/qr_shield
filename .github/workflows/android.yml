name: Flutter Android CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter (Latest Stable)
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Dependencies
      run: flutter pub get

    # 1. لوکل ٹیسٹنگ والی APK بنانا
    - name: Build APK for Local Testing
      run: flutter build apk --debug

    # 2. اے پی کے فائل کو کلاؤڈ پر محفوظ کرنا
    - name: Upload Testing APK to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: QR-Shield-Testing-APK
        path: build/app/outputs/flutter-apk/app-debug.apk

    # 3. پلے اسٹور کے لیے فائنل AAB بنانا (صحیح ناموں کے ساتھ)
    - name: Build App Bundle (AAB)
      run: flutter build appbundle --release
      env:
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

    # 4. فائنل AAB فائل کو کلاؤڈ پر محفوظ کرنا
    - name: Upload App Bundle to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: QR-Shield-PlayStore-AAB
        path: build/app/outputs/bundle/release/app-release.aab
